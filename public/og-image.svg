<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3a7bd5"/>
      <stop offset="60%" stop-color="#1a4a8a"/>
      <stop offset="100%" stop-color="#0d2a5c"/>
    </radialGradient>
    <radialGradient id="globeShine" cx="35%" cy="30%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="340" cy="315" r="238"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="white" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Globe circle shadow -->
  <circle cx="345" cy="322" r="242" fill="black" opacity="0.35"/>

  <!-- Globe fill -->
  <circle cx="340" cy="315" r="238" fill="url(#globeGrad)"/>

  <!-- Latitude lines -->
  <g clip-path="url(#globeClip)" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none">
    <ellipse cx="340" cy="315" rx="238" ry="48"/>
    <ellipse cx="340" cy="315" rx="238" ry="110"/>
    <ellipse cx="340" cy="315" rx="238" ry="180"/>
    <ellipse cx="340" cy="315" rx="220" ry="238" transform="rotate(30 340 315)"/>
    <ellipse cx="340" cy="315" rx="220" ry="238" transform="rotate(90 340 315)"/>
    <ellipse cx="340" cy="315" rx="220" ry="238" transform="rotate(150 340 315)"/>
  </g>

  <!-- Country outline suggestions (simplified) -->
  <g clip-path="url(#globeClip)" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.2)" stroke-width="1.2">
    <!-- Rough North America shape -->
    <polygon points="220,195 275,175 310,190 330,210 315,255 290,280 260,270 235,245 215,220"/>
    <!-- Rough Europe/Africa area -->
    <polygon points="335,200 370,195 385,215 378,245 360,268 340,262 328,240 330,215"/>
    <polygon points="338,270 365,268 375,295 368,335 350,355 330,348 322,320 325,295"/>
    <!-- Rough Asia -->
    <polygon points="390,195 445,185 475,200 488,225 470,255 440,265 405,258 385,235 385,215"/>
  </g>

  <!-- Overlay shape 1 (red) — "placed" country -->
  <g clip-path="url(#globeClip)" filter="url(#glow)">
    <polygon points="255,270 310,260 325,285 318,315 295,330 265,322 248,300" fill="rgba(220,50,50,0.55)" stroke="#ff6666" stroke-width="1.8"/>
  </g>

  <!-- Overlay shape 2 (blue) — comparison country -->
  <g clip-path="url(#globeClip)" filter="url(#glow)">
    <polygon points="345,230 390,222 408,248 398,278 370,290 345,282 330,260" fill="rgba(50,130,220,0.55)" stroke="#66aaff" stroke-width="1.8"/>
  </g>

  <!-- Globe shine -->
  <circle cx="340" cy="315" r="238" fill="url(#globeShine)"/>
  <!-- Globe border -->
  <circle cx="340" cy="315" r="238" fill="none" stroke="rgba(100,160,255,0.35)" stroke-width="1.5"/>

  <!-- Right-side text content -->
  <!-- Title -->
  <text x="660" y="220" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="64" fill="white" letter-spacing="-1">TheTrueSize<tspan fill="#5eaeff">3D</tspan></text>

  <!-- Divider -->
  <line x1="660" y1="248" x2="1130" y2="248" stroke="rgba(94,170,255,0.5)" stroke-width="2"/>

  <!-- Tagline -->
  <text x="660" y="298" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="28" fill="rgba(200,220,255,0.9)">Compare country &amp; region sizes</text>
  <text x="660" y="338" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="28" fill="rgba(200,220,255,0.9)">on an interactive 3D globe</text>

  <!-- Feature bullets -->
  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="rgba(160,200,255,0.85)">
    <text x="665" y="402">&#x2022; Overlay up to 3 countries at once</text>
    <text x="665" y="440">&#x2022; Drag &amp; rotate overlays freely</text>
    <text x="665" y="478">&#x2022; No Mercator distortion — true sizes</text>
  </g>

  <!-- URL badge -->
  <rect x="660" y="510" width="340" height="48" rx="8" fill="rgba(94,170,255,0.18)" stroke="rgba(94,170,255,0.45)" stroke-width="1.5"/>
  <text x="830" y="542" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#8ec8ff" text-anchor="middle" font-weight="500">thetruesize3d.com</text>
</svg>
