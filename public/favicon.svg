<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle: dark navy -->
  <circle cx="16" cy="16" r="16" fill="#1a1a2e"/>
  <!-- Globe sphere -->
  <circle cx="16" cy="16" r="13" fill="#0f3460" stroke="#4a9eff" stroke-width="0.8"/>
  <!-- Latitude lines -->
  <ellipse cx="16" cy="16" rx="13" ry="4.5" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.35"/>
  <ellipse cx="16" cy="16" rx="13" ry="9" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.25"/>
  <!-- Equator -->
  <line x1="3" y1="16" x2="29" y2="16" stroke="#ffffff" stroke-width="0.7" opacity="0.4"/>
  <!-- Longitude lines -->
  <ellipse cx="16" cy="16" rx="4.5" ry="13" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.35"/>
  <ellipse cx="16" cy="16" rx="9" ry="13" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.25"/>
  <!-- Prime meridian -->
  <line x1="16" y1="3" x2="16" y2="29" stroke="#ffffff" stroke-width="0.7" opacity="0.4"/>
  <!-- Country overlay accent (red patch, top-right quadrant) -->
  <path d="M16 16 Q20 10 24 12 Q26 15 24 19 Q20 21 16 16Z" fill="#cc3333" opacity="0.75"/>
</svg>
